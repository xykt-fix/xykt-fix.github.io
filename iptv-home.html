<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart TV Box UI</title>
    <style>
        :root {
            --bg-color: #0d0f12;
            --sidebar-color: #15181f;
            --card-bg: #1e232b;
            --accent-color: #0078ff;
            --text-color: #ffffff;
            --text-muted: #8a96a3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 240px;
            background-color: var(--sidebar-color);
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            gap: 20px;
            border-right: 1px solid #232833;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 20px;
            padding-left: 10px;
        }

        .nav-item {
            padding: 14px 18px;
            border-radius: 8px;
            font-size: 16px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* Main Content Dashboard */
        .main-content {
            flex: 1;
            height: 100%;
            padding: 40px;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .hero-banner {
            width: 100%;
            height: 260px;
            background: linear-gradient(90deg, rgba(0,120,255,0.6) 0%, rgba(21,24,31,0.8) 100%), url('picsum.photos') center/cover;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .hero-banner h1 { font-size: 32px; margin-bottom: 8px; }
        .hero-banner p { color: #e1e1e1; font-size: 16px; max-width: 500px; }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-color);
        }

        .row-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        /* Hide horizontal scrollbar scrollbar mechanics */
        .row-container::-webkit-scrollbar { display: none; }

        .card {
            min-width: 200px;
            width: 200px;
            height: 120px;
            background-color: var(--card-bg);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 3px solid transparent;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-title {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            font-size: 14px;
            text-align: center;
        }

        /* Focused Elements State (TV Remote Control simulation) */
        .focusable:focus, .focusable.focused {
            outline: none;
            border-color: var(--accent-color);
            background-color: var(--accent-color);
            color: #fff;
            transform: scale(1.08);
            box-shadow: 0 0 15px rgba(0, 120, 255, 0.6);
            z-index: 10;
        }
        
        .nav-item.focused {
            background-color: #232833;
            color: var(--text-color);
            border-left: 4px solid var(--accent-color);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <!-- Left Sidebar Navigation Menu -->
    <div class="sidebar" id="sidebar">
        <div class="logo">BOX TV</div>
        <div class="nav-item focusable focused" data-type="nav">Home</div>
        <div class="nav-item focusable" data-type="nav">Movies</div>
        <div class="nav-item focusable" data-type="nav">TV Shows</div>
        <div class="nav-item focusable" data-type="nav">Apps</div>
        <div class="nav-item focusable" data-type="nav">Settings</div>
    </div>

    <!-- Right Side Dashboard Grid Layout -->
    <div class="main-content">
        <div class="hero-banner">
            <h1>Featured Content</h1>
            <p>Stream your favorite movies, channels, and applications instantly on the main launcher interface.</p>
        </div>

        <div class="section-title">Recent Applications</div>
        <div class="row-container" id="app-row">
            <div class="card focusable" data-type="card"><img src="picsum.photos" alt="App"><div class="card-title">Netflix</div></div>
            <div class="card focusable" data-type="card"><img src="picsum.photos" alt="App"><div class="card-title">YouTube</div></div>
            <div class="card focusable" data-type="card"><img src="picsum.photos" alt="App"><div class="card-title">Prime Video</div></div>
            <div class="card focusable" data-type="card"><img src="picsum.photos" alt="App"><div class="card-title">Plex</div></div>
            <div class="card focusable" data-type="card"><img src="picsum.photos" alt="App"><div class="card-title">Twitch</div></div>
        </div>
    </div>

    <!-- Spatial Remote Controller Script Logic -->
    <script>
        // Track the elements using a matrix spatial structure
        const sidebarItems = Array.from(document.querySelectorAll('.nav-item'));
        const cardItems = Array.from(document.querySelectorAll('.card'));
        
        let currentSection = 'sidebar'; // Options: 'sidebar', 'content'
        let sidebarIndex = 0;
        let cardIndex = 0;

        function updateFocus() {
            // Remove previous focus states
            document.querySelectorAll('.focusable').forEach(el => el.classList.remove('focused'));

            if (currentSection === 'sidebar') {
                sidebarItems[sidebarIndex].classList.add('focused');
                sidebarItems[sidebarIndex].scrollIntoView({ block: 'nearest' });
            } else if (currentSection === 'content') {
                cardItems[cardIndex].classList.add('focused');
                cardItems[cardIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
            }
        }

        // Handle D-Pad Remote Control Events
        window.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    if (currentSection === 'sidebar' && sidebarIndex > 0) {
                        sidebarIndex--;
                    }
                    break;
                case 'ArrowDown':
                    if (currentSection === 'sidebar' && sidebarIndex < sidebarItems.length - 1) {
                        sidebarIndex++;
                    }
                    break;
                case 'ArrowLeft':
                    if (currentSection === 'content') {
                        if (cardIndex > 0) {
                            cardIndex--;
                        } else {
                            // Snap back to sidebar
                            currentSection = 'sidebar';
                        }
                    }
                    break;
                case 'ArrowRight':
                    if (currentSection === 'sidebar') {
                        currentSection = 'content';
                    } else if (currentSection === 'content' && cardIndex < cardItems.length - 1) {
                        cardIndex++;
                    }
                    break;
                case 'Enter':
                    const activeElement = document.querySelector('.focused');
                    if (activeElement) {
                        alert('Selected: ' + activeElement.innerText.trim());
                    }
                    break;
            }
            updateFocus();
        });
    </script>
</body>
</html>
