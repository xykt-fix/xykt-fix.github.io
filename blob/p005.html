<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamBox IPTV</title>
    <!-- Importing Satoshi Font -->
    <style>
        @font-face {
            font-family: 'Satoshi-Medium';
            src: url('https://website-files.com') format('woff2');
            font-weight: 500;
            font-style: normal;
        }

        body {
            font-family: 'Satoshi-Medium', sans-serif;
            background-color: #101014;
            color: white;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 200px;
            background-color: #1a1a20;
            display: flex;
            flex-direction: column;
            padding: 30px 15px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ff385c;
            margin-bottom: 50px;
            text-align: center;
        }

        .nav-item {
            padding: 15px;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
            color: #a0a0a0;
            margin-bottom: 10px;
        }

        .nav-item:hover, .nav-item.active {
            background-color: #ff385c;
            color: white;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 28px;
            margin-bottom: 20px;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: #1a1a20;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: 0.2s;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: scale(1.05);
            border-color: #ff385c;
        }

        .card-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 14px;
            color: #e0e0e0;
        }

        /* Channel List Specifics */
        .channel-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .channel-item {
            background-color: #1a1a20;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .channel-item:hover { background-color: #2a2a30; }

        .settings-panel {
            background-color: #1a1a20;
            padding: 30px;
            border-radius: 10px;
        }

        .settings-item {
            padding: 15px 0;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">StreamBox</div>
        <div class="nav-item active">📺 Live TV</div>
        <div class="nav-item">🎬 Movies</div>
        <div class="nav-item">📺 Series</div>
        <div class="nav-item">⚙️ Settings</div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="section-title">Live Channels</div>
        
        <div class="channel-list" id="channels">
            <!-- Channels will be generated by JS -->
        </div>
    </div>

    <script>
        // Generate 50 Random Channels
        const container = document.getElementById('channels');
        for (let i = 1; i <= 50; i++) {
            const channel = document.createElement('div');
            channel.className = 'channel-item';
            channel.innerHTML = `
                <span>${i}. Channel Name ${i}</span>
                <span style="color: #ff385c;">${Math.random() > 0.5 ? 'HD' : 'SD'}</span>
            `;
            container.appendChild(channel);
        }
    </script>
</body>
</html>
