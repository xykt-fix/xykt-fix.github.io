<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple IPTV Dashboard</title>
    <style>
        body { margin: 0; background-color: #111; color: white; font-family: sans-serif; overflow: hidden; }
        .container { display: flex; height: 100vh; }
        
        /* Sidebar Navigation */
        .sidebar { width: 200px; background: #222; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .menu-item { padding: 15px; cursor: pointer; background: #333; text-align: center; border-radius: 5px; transition: 0.2s; }
        .menu-item:hover, .menu-item.active { background: #007bff; }

        /* Content Area */
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }
        
        /* Grid Layouts */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .item { background: #333; padding: 10px; border-radius: 5px; text-align: center; cursor: pointer; transition: 0.2s; }
        .item:hover { transform: scale(1.05); background: #444; }
        .thumbnail { width: 100%; height: 100px; background: #555; border-radius: 5px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        
        h1 { margin-top: 0; }
        .setting-row { padding: 15px; background: #222; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
        <h2>IPTV Box</h2>
        <div class="menu-item active" onclick="showPage('live')">Live TV</div>
        <div class="menu-item" onclick="showPage('movies')">Movies</div>
        <div class="menu-item" onclick="showPage('series')">TV Shows</div>
        <div class="menu-item" onclick="showPage('settings')">Settings</div>
    </div>

    <!-- Main Content -->
    <div class="content">
        <!-- Live TV Page -->
        <div id="live" class="page active">
            <h1>Live TV (50 Channels)</h1>
            <div class="grid" id="channel-grid">
                <!-- Channels generated by JS -->
            </div>
        </div>

        <!-- Movies Page -->
        <div id="movies" class="page">
            <h1>Movies</h1>
            <div class="grid" id="movie-grid"></div>
        </div>

        <!-- TV Shows Page -->
        <div id="series" class="page">
            <h1>TV Shows</h1>
            <div class="grid" id="series-grid"></div>
        </div>

        <!-- Settings Page -->
        <div id="settings" class="page">
            <h1>Settings</h1>
            <div class="setting-row"><span>Username</span> <span>User123</span></div>
            <div class="setting-row"><span>Server</span> <span>http://example.com</span></div>
            <div class="setting-row"><span>Theme</span> <span>Dark</span></div>
            <div class="setting-row"><span>Version</span> <span>1.0.0</span></div>
        </div>
    </div>
</div>

<script>
    // --- SIMPLE DATA GENERATION ---
    // 50 Channels
    const channelGrid = document.getElementById('channel-grid');
    for (let i = 1; i <= 50; i++) {
        channelGrid.innerHTML += `
            <div class="item">
                <div class="thumbnail">LOGO</div>
                <div>Channel ${i}</div>
            </div>`;
    }

    // 20 Movies
    const movieGrid = document.getElementById('movie-grid');
    for (let i = 1; i <= 20; i++) {
        movieGrid.innerHTML += `
            <div class="item">
                <div class="thumbnail">🎬</div>
                <div>Movie ${i}</div>
            </div>`;
    }

    // 20 TV Shows
    const seriesGrid = document.getElementById('series-grid');
    for (let i = 1; i <= 20; i++) {
        seriesGrid.innerHTML += `
            <div class="item">
                <div class="thumbnail">📺</div>
                <div>Series ${i}</div>
            </div>`;
    }

    // --- NAVIGATION LOGIC ---
    function showPage(pageId) {
        // Hide all pages
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        
        // Show current
        document.getElementById(pageId).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>

</body>
</html>
