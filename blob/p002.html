<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumStream Portal</title>
    <style>
        :root {
            --bg-dark: #101014;
            --bg-light: #1c1c22;
            --accent: #007bff;
            --text-main: #fff;
            --text-muted: #a0a0a0;
            --sidebar-width: 250px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-light);
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }

        .logo { font-size: 24px; font-weight: bold; color: var(--accent); margin-bottom: 40px; }
        .nav-item {
            padding: 15px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
            color: var(--text-muted);
        }
        .nav-item:hover, .nav-item.active { background-color: #333; color: var(--text-main); }

        /* Main Content */
        #main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .view { display: none; }
        .view.active { display: block; }

        h2 { margin-top: 0; }

        /* Grid Layouts */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--bg-light);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid transparent;
        }
        .card:hover { transform: scale(1.05); border-color: var(--accent); }
        .card-img {
            width: 100%;
            height: 100px;
            background-color: #333;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Channel List Specific */
        .channel-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .channel-item {
            background-color: var(--bg-light);
            padding: 15px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
        .channel-item:hover { background-color: #333; }

        /* Settings */
        .settings-item {
            background-color: var(--bg-light);
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <div id="sidebar">
        <div class="logo">QuantumStream</div>
        <div class="nav-item active" onclick="showView('live')">📺 Live TV</div>
        <div class="nav-item" onclick="showView('movies')">🎬 Movies</div>
        <div class="nav-item" onclick="showView('shows')">🍿 TV Shows</div>
        <div class="nav-item" onclick="showView('settings')">⚙️ Settings</div>
    </div>

    <!-- Main View Area -->
    <div id="main-content">
        
        <!-- Live TV View -->
        <div id="live" class="view active">
            <h2>Live Channels</h2>
            <div class="channel-list" id="channel-container">
                <!-- Channels generated by JS -->
            </div>
        </div>

        <!-- Movies View -->
        <div id="movies" class="view">
            <h2>On-Demand Movies</h2>
            <div class="grid" id="movie-container">
                <!-- Movies generated by JS -->
            </div>
        </div>

        <!-- TV Shows View -->
        <div id="shows" class="view">
            <h2>TV Series</h2>
            <div class="grid" id="series-container">
                <!-- Shows generated by JS -->
            </div>
        </div>

        <!-- Settings View -->
        <div id="settings" class="view">
            <h2>Settings</h2>
            <div class="settings-item">
                <span>Account: Free Trial</span>
                <button>Logout</button>
            </div>
            <div class="settings-item">
                <span>Player Engine</span>
                <select><option>Auto</option><option>VLC</option></select>
            </div>
            <div class="settings-item">
                <span>Theme</span>
                <select><option>Dark</option><option>Light</option></select>
            </div>
        </div>
    </div>

    <script>
        // NAVIGATION
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // GENERATE 50 CHANNELS
        const channels = Array.from({length: 50}, (_, i) => `Channel ${i + 1} - ${['News', 'Sports', 'Movies', 'Kids'][i%4]}`);
        const container = document.getElementById('channel-container');
        channels.forEach(ch => {
            container.innerHTML += `<div class="channel-item"><span>${ch}</span><span>Now Playing...</span></div>`;
        });

        // GENERATE MOCK MOVIES/SHOWS
        const content = ['Matrix', 'Inception', 'Dark Knight', 'Interstellar', 'Dune', 'Avengers', 'Avatar', 'Alien'];
        const movieContainer = document.getElementById('movie-container');
        const seriesContainer = document.getElementById('series-container');

        content.forEach(m => {
            movieContainer.innerHTML += `<div class="card"><div class="card-img">${m} Poster</div>${m}</div>`;
            seriesContainer.innerHTML += `<div class="card"><div class="card-img">${m} Series</div>${m} S1-E5</div>`;
        });
    </script>
</body>
</html>
