<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Interface</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #f8f9fa; color: #333; overflow: hidden; }
        
        /* Sidebar Navigation */
        .sidebar { width: 250px; background-color: #ffffff; border-right: 1px solid #e9ecef; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .sidebar h2 { color: #0056b3; margin-bottom: 30px; }
        .nav-link { padding: 15px 20px; text-decoration: none; color: #6c757d; font-weight: 600; margin-bottom: 10px; border-radius: 8px; transition: all 0.3s ease; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background-color: #e6f2ff; color: #0056b3; }

        /* Main Content Area */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; background-color: #f8f9fa; }
        .view { display: none; }
        .view.active { display: block; }

        /* General UI Elements */
        h1 { margin-bottom: 25px; color: #343a40; }
        .controls { display: flex; gap: 15px; margin-bottom: 25px; }
        .btn { padding: 10px 20px; background: #e9ecef; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        .btn.active, .btn:hover { background: #0056b3; color: white; }

        /* Grid Layout */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e9ecef; padding: 15px; text-align: center; cursor: pointer; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .card-img { width: 100%; height: 120px; background: #dee2e6; border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #6c757d; }

        /* Settings View */
        .settings-card { background: white; padding: 25px; border-radius: 12px; max-width: 600px; border: 1px solid #e9ecef; }
        .settings-item { margin-bottom: 20px; }
        .settings-item label { display: block; font-weight: bold; margin-bottom: 8px; color: #495057; }
        .settings-item input, .settings-item select { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 6px; }

    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>SmartIPTV</h2>
        <a class="nav-link active" onclick="switchView('live-tv')">Live TV</a>
        <a class="nav-link" onclick="switchView('movies')">Movies</a>
        <a class="nav-link" onclick="switchView('tv-shows')">TV Shows</a>
        <a class="nav-link" onclick="switchView('settings')">Settings</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        
        <!-- LIVE TV VIEW -->
        <div id="live-tv" class="view active">
            <h1>Live TV</h1>
            <div class="controls">
                <button class="btn active" onclick="filterChannels('mongolian')">Mongolian Channels (50)</button>
                <button class="btn" onclick="filterChannels('foreign')">Foreign Channels (50)</button>
            </div>
            <div class="grid" id="channel-grid"></div>
        </div>

        <!-- MOVIES VIEW -->
        <div id="movies" class="view">
            <h1>Movies</h1>
            <div class="grid" id="movie-grid">
                <!-- Populated via JS -->
            </div>
        </div>

        <!-- TV SHOWS VIEW -->
        <div id="tv-shows" class="view">
            <h1>TV Shows</h1>
            <div class="grid" id="show-grid">
                <!-- Populated via JS -->
            </div>
        </div>

        <!-- SETTINGS VIEW -->
        <div id="settings" class="view">
            <h1>Settings</h1>
            <div class="settings-card">
                <div class="settings-item">
                    <label for="server-url">Server URL</label>
                    <input type="text" id="server-url" value="http://example.com">
                </div>
                <div class="settings-item">
                    <label for="stream-quality">Default Stream Quality</label>
                    <select id="stream-quality">
                        <option value="hd">1080p (HD)</option>
                        <option value="sd">720p (SD)</option>
                        <option value="auto">Auto</option>
                    </select>
                </div>
                <div class="settings-item">
                    <label for="theme">Interface Theme</label>
                    <select id="theme">
                        <option value="light">Light (White)</option>
                        <option value="dark">Dark</option>
                    </select>
                </div>
                <button class="btn active" onclick="alert('Settings Saved!')">Save Changes</button>
            </div>
        </div>

    </div>

    <script>
        // View Switching Logic
        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Generate Channel Data (50 Mongolian, 50 Foreign)
        const mongolianChannels = Array.from({length: 50}, (_, i) => `MN Channel ${i + 1}`);
        const foreignChannels = Array.from({length: 50}, (_, i) => `INT Channel ${i + 1}`);

        // Channel Filtering Logic
        function filterChannels(type) {
            document.querySelectorAll('.controls .btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const channelGrid = document.getElementById('channel-grid');
            channelGrid.innerHTML = '';
            const list = type === 'mongolian' ? mongolianChannels : foreignChannels;

            list.forEach(name => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="card-img">📺</div><div><strong>${name}</strong></div>`;
                channelGrid.appendChild(card);
            });
        }

        // Generate Movie Data (15 Mock Items)
        const movies = ["Action Universe", "Sci-Fi Saga", "Drama Movie 1", "Comedy Hour", "Horror 3D", "Mongolian Legend", "Fantasy Quest", "Thriller Night", "Docu Series", "Anime Movie", "Warriors", "Detective", "Romance", "Adventure", "Western"];
        const movieGrid = document.getElementById('movie-grid');
        movies.forEach(name => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="card-img">🎬</div><div><strong>${name}</strong></div>`;
            movieGrid.appendChild(card);
        });

        // Generate TV Show Data (15 Mock Items)
        const shows = ["Drama Series 1", "Global News", "Travel Mongolia", "Cooking Today", "Talk Show Live", "Documentary P1", "Sitcom S3", "Sci-Fi Weekly", "Crime Files", "History Channel", "Sports Highlights", "Kids Zone", "Nature Life", "Reality TV", "Home Design"];
        const showGrid = document.getElementById('show-grid');
        shows.forEach(name => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="card-img">🖥️</div><div><strong>${name}</strong></div>`;
            showGrid.appendChild(card);
        });

        // Initial Load
        filterChannels('mongolian');
    </script>
</body>
</html>
