<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Box Interface</title>
    <!-- HLS Player Library -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 200px; background: #1f1f1f; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .menu-item { padding: 15px; cursor: pointer; background: #333; border-radius: 5px; text-align: center; }
        .menu-item:hover, .menu-item.active { background: #007bff; }
        #content { flex: 1; padding: 20px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: #222; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; }
        .card:hover { transform: scale(1.05); transition: 0.2s; }
        .thumbnail { width: 100%; height: 100px; background: #444; border-radius: 5px; margin-bottom: 5px; display:flex; align-items:center; justify-content:center; }
        #player-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; }
        video { width: 100%; height: 100%; }
        #back-btn { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.5); padding: 10px; cursor: pointer; border: none; color: white; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>IPTV Pro</h3>
    <div class="menu-item active" onclick="showSection('live')">Live TV</div>
    <div class="menu-item" onclick="showSection('movies')">Movies</div>
    <div class="menu-item" onclick="showSection('settings')">Settings</div>
</div>

<div id="content">
    <div id="live" class="section">
        <h2>Live TV (50 Channels)</h2>
        <div class="grid" id="channel-grid"></div>
    </div>
    <div id="movies" class="section" style="display:none;"><h2>Movies</h2><p>VOD Content</p></div>
    <div id="settings" class="section" style="display:none;"><h2>Settings</h2><p>Account & Player Options</p></div>
</div>

<!-- Player Section -->
<div id="player-container">
    <button id="back-btn" onclick="closePlayer()">← Back</button>
    <video id="video" controls autoplay></video>
</div>

<script>
    // --- 1. Populate Dummy Channels ---
    const grid = document.getElementById('channel-grid');
    for (let i = 1; i <= 50; i++) {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<div class="thumbnail">📺</div><p>Channel ${i}</p>`;
        // Example public HLS stream
        const sampleStream = 'https://mux.dev';
        div.onclick = () => playStream(sampleStream);
        grid.appendChild(div);
    }

    // --- 2. HLS Playback Logic ---
    function playStream(url) {
        document.getElementById('player-container').style.display = 'block';
        const video = document.getElementById('video');
        
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url; // Native support (Safari)
        }
    }

    function closePlayer() {
        document.getElementById('player-container').style.display = 'none';
        document.getElementById('video').pause();
    }

    // --- 3. UI Navigation ---
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        event.target.classList.add('active');
    }
</script>

</body>
</html>
