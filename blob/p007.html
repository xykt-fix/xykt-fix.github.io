<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamTV Pro - 2026 Edition</title>
    <style>
        :root {
            --bg-color: #101014;
            --sidebar-color: #1a1a20;
            --card-color: #25252e;
            --accent-color: #007bff;
            --text-color: #ffffff;
            --text-muted: #a0a0a0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background-color: var(--sidebar-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 40px;
            text-align: center;
        }

        .menu-item {
            padding: 15px;
            cursor: pointer;
            border-radius: 8px;
            color: var(--text-muted);
            transition: 0.3s;
            margin-bottom: 5px;
        }

        .menu-item:hover, .menu-item.active {
            background-color: var(--card-color);
            color: var(--text-color);
        }

        /* Main Content */
        .content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--card-color);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: scale(1.05);
            border-color: var(--accent-color);
        }

        .card-img {
            width: 100%;
            height: 100px;
            background-color: #333;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .card-title {
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hidden { display: none; }
        
        /* Settings Table */
        .settings-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .settings-table td {
            padding: 15px;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <div class="logo">StreamTV</div>
        <div class="menu-item active" onclick="showSection('live')">📺 Live TV</div>
        <div class="menu-item" onclick="showSection('movies')">🎬 Movies</div>
        <div class="menu-item" onclick="showSection('shows')">🍿 TV Shows</div>
        <div class="menu-item" onclick="showSection('settings')">⚙️ Settings</div>
    </div>

    <!-- Main Section -->
    <div class="content">
        <div class="header">
            <h1 id="section-title">Live TV</h1>
            <input type="text" placeholder="Search..." style="padding: 10px; border-radius: 5px; border:none; background:#25252e; color:white;">
        </div>

        <!-- Live TV Grid (50 Placeholder Items) -->
        <div id="live-section" class="grid">
            <script>
                for (let i = 1; i <= 50; i++) {
                    document.write(`
                        <div class="card">
                            <div class="card-img">Ch ${i}</div>
                            <div class="card-title">Channel Name ${i}</div>
                        </div>
                    `);
                }
            </script>
        </div>

        <!-- Movies Section -->
        <div id="movies-section" class="grid hidden">
            <div class="card"><div class="card-img">🎬</div><div class="card-title">The Matrix</div></div>
            <div class="card"><div class="card-img">🎬</div><div class="card-title">Inception</div></div>
        </div>

        <!-- TV Shows Section -->
        <div id="shows-section" class="grid hidden">
            <div class="card"><div class="card-img">🍿</div><div class="card-title">Breaking Bad</div></div>
            <div class="card"><div class="card-img">🍿</div><div class="card-title">The Office</div></div>
        </div>

        <!-- Settings Section -->
        <div id="settings-section" class="hidden" style="background:var(--card-color); padding:20px; border-radius:10px;">
            <h2>System Settings</h2>
            <table class="settings-table">
                <tr><td>Account Status</td><td><span style="color:lightgreen">Active</span></td></tr>
                <tr><td>Playlist URL</td><td>http://iptv.provider...</td></tr>
                <tr><td>EPG Sync</td><td><button>Sync Now</button></td></tr>
                <tr><td>Parental Control</td><td><button>Set PIN</button></td></tr>
            </table>
        </div>
    </div>

    <script>
        function showSection(section) {
            // Hide all sections
            document.getElementById('live-section').classList.add('hidden');
            document.getElementById('movies-section').classList.add('hidden');
            document.getElementById('shows-section').classList.add('hidden');
            document.getElementById('settings-section').classList.add('hidden');
            
            // Remove active class
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));

            // Show selected section
            document.getElementById(section + '-section').classList.remove('hidden');
            
            // Set Title
            document.getElementById('section-title').innerText = section.charAt(0).toUpperCase() + section.slice(1) + (section === 'live' ? ' TV' : '');
            
            // Mark menu active
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
