<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global & Mongolian IPTV</title>
    <link href="https://cloudflare.com" rel="stylesheet">
    <style>
        :root { --bg: #0a0c10; --side: #12151c; --accent: #00d2ff; --text: #eee; --card: #1c2129; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        nav { width: 80px; background: var(--side); display: flex; flex-direction: column; align-items: center; padding: 20px 0; border-right: 1px solid #222; }
        .nav-item { margin: 15px 0; font-size: 20px; cursor: pointer; color: #555; transition: 0.3s; text-align: center; }
        .nav-item.active, .nav-item:hover { color: var(--accent); }
        main { flex: 1; padding: 20px 40px; overflow-y: auto; }
        .search-bar { background: var(--card); border: 1px solid #333; padding: 10px 20px; border-radius: 20px; color: white; width: 300px; margin-bottom: 20px; outline: none; }
        h2 { border-left: 4px solid var(--accent); padding-left: 12px; margin-top: 30px; font-weight: 400; font-size: 1.2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 8px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid transparent; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 5px 15px rgba(0,210,255,0.2); }
        .card-img { width: 100%; aspect-ratio: 16/9; background: #252a33; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; text-align: center; color: #888; }
        .card-title { padding: 10px; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tag { font-size: 10px; background: #333; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }
        /* Player Modal */
        #player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .video-box { width: 80%; max-width: 900px; aspect-ratio: 16/9; background: #000; border-radius: 8px; position: relative; border: 1px solid #333; }
        .close-btn { position: absolute; top: -40px; right: 0; color: white; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-item active"><i class="fas fa-tv"></i><br><small>TV</small></div>
        <div class="nav-item"><i class="fas fa-film"></i><br><small>VOD</small></div>
        <div class="nav-item"><i class="fas fa-cog"></i><br><small>SET</small></div>
    </nav>

    <main>
        <input type="text" class="search-bar" placeholder="Search 50 channels...">
        
        <h2>Mongolian Channels (25)</h2>
        <div class="grid" id="mn-grid"></div>

        <h2>Foreign Channels (25)</h2>
        <div class="grid" id="intl-grid"></div>
    </main>

    <div id="player-modal" onclick="closePlayer()">
        <div class="video-box" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closePlayer()">&times;</span>
            <div style="height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(#222, #000);">
                <i class="fas fa-play-circle" style="font-size: 60px; color: var(--accent); margin-bottom: 15px;"></i>
                <h3 id="playing-now">Loading Stream...</h3>
                <p style="color: #666; font-size: 14px;">Playback starts in a few seconds</p>
            </div>
        </div>
    </div>

    <script>
        const mnChannels = [
            "MNB", "Mongol HD", "Eagle News", "NTV", "TV5", "TV9", "UBS", "MN25", "SBN", "C1", 
            "ETV", "Edutainment TV", "Bloomberg TV", "MNC", "VTV", "TV8", "SPS Sports", "SPS NBA", 
            "Mass TV", "Ekh Oron TV", "Moviebox", "AsianBox", "Dream TV", "Star TV", "Suld TV"
        ];

        const intlChannels = [
            "CNN International", "BBC World News", "Al Jazeera", "HBO HD", "Warner TV", "National Geographic", 
            "Discovery Channel", "Animal Planet", "Da Vinci", "Nickelodeon", "Cartoon Network", 
            "ESPN", "Sky Sports News", "Fox News", "CNBC", "Bloomberg Global", "Eurosport", 
            "MTV Global", "VH1 Classic", "Fashion TV", "CCTV News", "Arirang TV", "NHK World", 
            "France 24", "TV5Monde"
        ];

        function loadChannels(list, containerId, type) {
            const container = document.getElementById(containerId);
            list.forEach(name => {
                container.innerHTML += `
                    <div class="card" onclick="openPlayer('${name}')">
                        <div class="card-img" style="background: ${type === 'mn' ? '#1e3c72' : '#444'}">
                            ${name.toUpperCase()}
                        </div>
                        <div class="card-title">${name} <span class="tag">${type === 'mn' ? 'MN' : 'INTL'}</span></div>
                    </div>`;
            });
        }

        function openPlayer(name) {
            document.getElementById('playing-now').innerText = name;
            document.getElementById('player-modal').style.display = 'flex';
        }

        function closePlayer() {
            document.getElementById('player-modal').style.display = 'none';
        }

        loadChannels(mnChannels, 'mn-grid', 'mn');
        loadChannels(intlChannels, 'intl-grid', 'intl');
    </script>
</body>
</html>
