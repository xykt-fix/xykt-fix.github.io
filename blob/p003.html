<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamBox IPTV Pro</title>
    <style>
        :root {
            --bg-color: #121212;
            --side-bar: #1e1e1e;
            --accent: #e50914;
            --text: #ffffff;
            --text-muted: #aaaaaa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background-color: var(--side-bar);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .logo { font-size: 24px; font-weight: bold; color: var(--accent); margin-bottom: 40px; }
        .menu-item {
            padding: 15px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            color: var(--text-muted);
        }
        .menu-item:hover, .menu-item.active { background-color: #333; color: white; }

        /* Main Content */
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: #222;
            border-radius: 10px;
            padding: 15px;
            transition: transform 0.2s;
            cursor: pointer;
            text-align: center;
        }
        .card:hover { transform: scale(1.05); border: 1px solid var(--accent); }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; }
        .card-title { margin-top: 10px; font-weight: bold; font-size: 14px; }
        .card-meta { color: var(--text-muted); font-size: 12px; }

        /* Settings Style */
        .settings-panel { display: none; }
        .setting-item { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        /* Utility */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="logo">📺 StreamBox</div>
            <div class="menu-item active" onclick="showSection('live')">Live TV</div>
            <div class="menu-item" onclick="showSection('movies')">Movies</div>
            <div class="menu-item" onclick="showSection('series')">TV Series</div>
        </div>
        <div>
            <div class="menu-item" onclick="showSection('settings')">⚙️ Settings</div>
        </div>
    </div>

    <div class="content">
        <!-- Live TV Section -->
        <div id="live" class="section">
            <div class="header"><h1>Live TV (50 Channels)</h1></div>
            <div class="grid" id="channel-grid">
                <!-- Channels generated by JS -->
            </div>
        </div>

        <!-- Movies Section -->
        <div id="movies" class="section hidden">
            <div class="header"><h1>Movies</h1></div>
            <div class="grid">
                <div class="card"><img src="https://picsum.photos"> <div class="card-title">Action Core</div></div>
                <div class="card"><img src="https://picsum.photos"> <div class="card-title">Comedy Night</div></div>
                <div class="card"><img src="https://picsum.photos"> <div class="card-title">Dark Future</div></div>
            </div>
        </div>

        <!-- Settings Section -->
        <div id="settings" class="section hidden">
            <div class="header"><h1>Settings</h1></div>
            <div class="settings-panel" style="display:block;">
                <div class="setting-item"><strong>Account:</strong> Premium Active</div>
                <div class="setting-item"><strong>Version:</strong> 2026.04.25</div>
                <div class="setting-item"><strong>Server:</strong> Primary (EU)</div>
                <div class="setting-item"><button style="background:var(--accent); color:white; border:none; padding:10px; border-radius:5px;">Logout</button></div>
            </div>
        </div>
    </div>

    <script>
        // Generate 50 Dummy Channels
        const grid = document.getElementById('channel-grid');
        for (let i = 1; i <= 50; i++) {
            grid.innerHTML += `
                <div class="card">
                    <div style="background:#333; height:100px; border-radius:5px; display:flex; align-items:center; justify-content:center;">CH</div>
                    <div class="card-title">Channel ${i}</div>
                    <div class="card-meta">Live</div>
                </div>
            `;
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
